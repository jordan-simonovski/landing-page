<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Jordan Simonovski - observability engineer, builder of useful dev tools, and cloud tinkerer."
    />
    <title>Jordan Simonovski</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <span class="orb orb-a"></span>
      <span class="orb orb-b"></span>
      <span class="orb orb-c"></span>
      <span class="grain"></span>
    </div>

    <main class="page-shell">
      <header class="hero">
        <p class="eyebrow">Jordan Simonovski</p>
        <h1>Build cool things.<br />Measure everything.</h1>
        <p class="subhead">
          O11y @ Atlassian. Dev + ops fence-sitter. Shipping side projects with
          attitude.
        </p>
      </header>

      <nav class="link-grid" aria-label="Primary links">
        <a
          class="link-card"
          href="https://cv.jordansimonov.ski"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open CV"
        >
          <span class="link-kicker">Career</span>
          <strong>CV</strong>
          <span class="link-arrow">Open -></span>
        </a>
        <a
          class="link-card"
          href="https://blog.jordansimonov.ski"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open blog"
        >
          <span class="link-kicker">Thoughts</span>
          <strong>Blog</strong>
          <span class="link-arrow">Read -></span>
        </a>
        <a
          class="link-card"
          href="https://github.com/jordan-simonovski"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open GitHub profile"
        >
          <span class="link-kicker">Code</span>
          <strong>GitHub</strong>
          <span class="link-arrow">Browse -></span>
        </a>
        <a
          class="link-card"
          href="https://www.linkedin.com/in/jsimonovski/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open LinkedIn profile"
        >
          <span class="link-kicker">Network</span>
          <strong>LinkedIn</strong>
          <span class="link-arrow">Connect -></span>
        </a>
      </nav>

      <footer class="footer-note">
        <p>Can I shippost in my side-projects too?</p>
      </footer>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
